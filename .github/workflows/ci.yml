name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Build and test on Node 22
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Run localhost MVP release gate
        run: npm run local:release-gate
      - name: Verify deployable application artifact
        run: |
          test -f dist/server.js
          test -f dist/public/index.html
          test -f dist/public/api-docs.html
          for schema in src/schemas/*.shex; do
            test -f "dist/schemas/$(basename "${schema}")"
          done
          node -e "const { loadAllSchemas } = require('./dist/schemas'); const schemas = loadAllSchemas(); if (Object.keys(schemas).length < 9) throw new Error('missing schemas from dist');"
