name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Minimal permissions – jobs that upload artifacts declare write only for that scope.
permissions:
  contents: read

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  # ── Type-check ───────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  # ── Unit tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Integration tests (non-required) ─────────────────────────────────────────
  #
  # Runs integration tests against a containerised CSS endpoint.
  # This job is intentionally not listed as a required branch-protection check
  # while the environment is being stabilised; promote it to required once it
  # passes consistently for several runs.
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build]
    permissions:
      contents: read
    services:
      css:
        image: solidproject/community-solid-server:latest
        ports:
          - 3000:3000
        options: >-
          --health-cmd "wget -qO- http://localhost:3000/ || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 15s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # Wait for CSS to be healthy before running tests.
      - name: Wait for CSS
        run: |
          chmod +x scripts/wait-for-pod.sh
          ./scripts/wait-for-pod.sh http://localhost:3000
      # Provision a test account on the local CSS.
      # CSS v7+ exposes a /setup endpoint for the first-time user.
      # For CI we rely on the default open-registration CSS configuration and
      # create the account + client credentials via the REST API.
      - name: Provision CSS test account
        id: provision
        run: |
          # Register a test account (CSS default config allows open registration).
          curl -sf -X POST http://localhost:3000/idp/register/ \
            -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"test-password","confirmPassword":"test-password","createPod":true,"podName":"alice"}' \
            || echo "Account may already exist or registration endpoint differs – continuing"

          # Obtain a client-credentials token pair.
          TOKEN_RESP=$(curl -sf -X POST http://localhost:3000/alice/idp/credentials/ \
            -H "Content-Type: application/json" \
            -d '{"name":"ci-test-client","email":"test@example.com","password":"test-password"}' \
            2>/dev/null || echo '{}')

          CLIENT_ID=$(echo "$TOKEN_RESP" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          CLIENT_SECRET=$(echo "$TOKEN_RESP" | grep -o '"secret":"[^"]*"' | head -1 | cut -d'"' -f4)

          if [ -z "$CLIENT_ID" ]; then
            echo "Could not provision client credentials. Integration tests will be skipped."
            echo "INTEGRATION_SKIP=true" >> "$GITHUB_ENV"
          else
            echo "INTEGRATION_CLIENT_ID=$CLIENT_ID" >> "$GITHUB_ENV"
            echo "INTEGRATION_CLIENT_SECRET=$CLIENT_SECRET" >> "$GITHUB_ENV"
          fi

      - name: Run integration tests
        if: env.INTEGRATION_SKIP != 'true'
        env:
          INTEGRATION_TEST_BASE_URL: http://localhost:3000
          INTEGRATION_POD_BASE_URL: http://localhost:3000/alice/
        run: npm run test:integration
        continue-on-error: true
