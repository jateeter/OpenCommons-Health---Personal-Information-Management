name: Docker Deploy

# ─── Triggers ────────────────────────────────────────────────────────────────
#
# • push to main / release branches  → build, smoke-test, push image to GHCR
# • pull_request                      → build + smoke-test only (no push)
# • workflow_dispatch                 → manual trigger (same as push path)
#
# ─── Verification roadmap ────────────────────────────────────────────────────
#
# Stage 1 – Image build
#   The `build` job compiles TypeScript and assembles the production Docker
#   image (multi-stage Dockerfile).  Success proves the image can be built
#   from the current commit without errors.
#
# Stage 2 – Compose stack smoke tests
#   The `smoke-test` job runs `docker compose up --build -d` which starts
#   both the PIM web app and the Community Solid Server (CSS), then calls
#   `scripts/verify-deployment.sh` to assert:
#     • CSS health    GET http://localhost:${CSS_PORT}/       → HTTP 200
#     • PIM root      GET http://localhost:${APP_PORT}/       → packaged HTML UI
#     • PIM liveness  GET http://localhost:${APP_PORT}/livez  → {"ok":true}
#     • Solid auth     GET http://localhost:${APP_PORT}/api/status → {"ok":true}
#     • Domain API     authenticated condition + insurance CRUD against the pod
#     • Persistence    a condition remains readable after restarting CSS + PIM
#
# Stage 3 – Image push (main branch only)
#   The `push` job tags the validated image as `ghcr.io/<owner>/<repo>:latest`
#   and the full Git SHA, then pushes to GitHub Container Registry.  This
#   provides a pull-ready artefact for downstream deployments.
#
# ─── Local reproduction ──────────────────────────────────────────────────────
#
#   docker compose up --build            # start the full stack
#   ./scripts/verify-deployment.sh       # run smoke tests manually
#   docker compose logs pim              # inspect PIM logs
#   docker compose logs css              # inspect CSS logs
#   docker compose down                  # tear down

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # needed to push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Configurable service ports – override via repository/environment variables.
  CSS_PORT: "3000"
  APP_PORT: "8080"
  CSS_ACCOUNT_EMAIL: alice@example.test
  CSS_ACCOUNT_PASSWORD: ci-only-opencommons-password
  CSS_POD_NAME: alice

jobs:
  # ── Stage 1: Build the production Docker image ─────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: opencommons-health-pim:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Node runtime and application entrypoint
        run: |
          docker run --rm --entrypoint node opencommons-health-pim:ci --version | grep -E '^v22\.'
          test "$(docker image inspect opencommons-health-pim:ci --format '{{json .Config.Cmd}}')" = '["node","dist/server.js"]'

      - name: Smoke-test the built image
        run: |
          docker run --rm -d --name opencommons-health-entrypoint \
            -p 127.0.0.1:18080:8080 \
            opencommons-health-pim:ci
          trap 'docker stop opencommons-health-entrypoint' EXIT
          for attempt in $(seq 1 20); do
            curl -sf http://127.0.0.1:18080/livez && break
            sleep 1
          done
          curl -sf http://127.0.0.1:18080/livez | grep -F '"ok":true'
          curl -sf http://127.0.0.1:18080/ | grep -F 'OpenCommons Health'

  # ── Stage 2: Smoke-test the full compose stack ─────────────────────────────
  smoke-test:
    name: Compose stack smoke tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start compose stack (PIM + CSS)
        run: |
          docker compose up --build -d
        env:
          COMPOSE_FILE: docker-compose.yml
          CSS_PORT: ${{ env.CSS_PORT }}
          APP_PORT: ${{ env.APP_PORT }}

      - name: Run deployment smoke tests
        run: |
          chmod +x scripts/verify-deployment.sh
          WAIT_TIMEOUT=120 ./scripts/verify-deployment.sh \
            http://localhost:${{ env.APP_PORT }} \
            http://localhost:${{ env.CSS_PORT }}

      - name: Verify pod and credential persistence across restart
        run: |
          created="$(curl -fsS -X POST "http://localhost:${APP_PORT}/api/resources/conditions" \
            -H "content-type: application/json" \
            --data '{"code":{"system":"http://snomed.info/id/","code":"162864005","display":"Persistence test"},"status":"active"}')"
          resource_url="$(printf '%s' "${created}" | jq -r '.data.url')"
          test -n "${resource_url}"
          test "${resource_url}" != "null"
          docker compose restart css pim
          for attempt in $(seq 1 40); do
            curl -fsS "http://localhost:${APP_PORT}/api/status" | grep -F '"ok":true' && break
            sleep 3
          done
          curl -fsS --get "http://localhost:${APP_PORT}/api/resources/conditions" \
            --data-urlencode "url=${resource_url}" | grep -F '"code":"162864005"'
          docker compose up --force-recreate --no-deps bootstrap
          docker compose logs bootstrap | grep -F "Reusing client credentials"

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== PIM logs ==="
          docker compose logs pim || true
          echo "=== CSS logs ==="
          docker compose logs css || true
          echo "=== Bootstrap logs ==="
          docker compose logs bootstrap || true

      - name: Tear down compose stack
        if: always()
        run: docker compose down --volumes

  # ── Stage 3: Push validated image to GHCR (main branch only) ───────────────
  push:
    name: Push image to GHCR
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
