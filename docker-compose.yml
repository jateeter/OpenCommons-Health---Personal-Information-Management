# ─── Local / CI deployment stack ─────────────────────────────────────────────
#
# Brings up two services:
#   css  – Community Solid Server (local identity + pod storage)
#   pim  – OpenCommons Health PIM web app (connects to css)
#
# Quick-start:
#   docker compose up --build
#
# Configurable ports (set in .env or shell before running):
#   CSS_PORT   – Solid Community Server port  (default: 3000)
#   APP_PORT   – PIM web app host port        (default: 8080)
#
# Visit:
#   http://localhost:${APP_PORT}        PIM app root
#   http://localhost:${APP_PORT}/healthz  PIM liveness probe
#   http://localhost:${CSS_PORT}        Solid Community Server
#
# Override defaults with a .env file (see .env.example).

services:
  # ── Solid Community Server ──────────────────────────────────────────────────
  css:
    image: solidcommunityserver/community-solid-server:latest
    command:
      - "-c"
      - "@css:config/default.json"
      - "-p"
      - "${CSS_PORT:-3000}"
    ports:
      - "127.0.0.1:${CSS_PORT:-3000}:${CSS_PORT:-3000}"
    environment:
      CSS_LOGGING_LEVEL: warn
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${CSS_PORT:-3000}/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s
    restart: unless-stopped

  # ── PIM web app ─────────────────────────────────────────────────────────────
  pim:
    build:
      context: .
      dockerfile: Dockerfile
    image: opencommons-health-pim:local
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:${APP_PORT:-8080}"
    environment:
      NODE_ENV: production
      PORT: "${APP_PORT:-8080}"
      HOST: 0.0.0.0
      SOLID_POD_SERVER_URL: "http://css:${CSS_PORT:-3000}"
      SOLID_OIDC_ISSUER: "http://css:${CSS_PORT:-3000}"
      SOLID_POD_BASE_URL: ${SOLID_POD_BASE_URL:-http://css:3000/alice/}
      SOLID_POD_PATH: ${SOLID_POD_PATH:-/health-pim/}
      SOLID_REDIRECT_URL: "http://localhost:${APP_PORT:-8080}/callback"
      SOLID_CLIENT_ID: ${SOLID_CLIENT_ID:-}
      SOLID_CLIENT_SECRET: ${SOLID_CLIENT_SECRET:-}
    depends_on:
      css:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${APP_PORT:-8080}/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
