# ─── Local / CI deployment stack ─────────────────────────────────────────────
#
# Brings up three services:
#   css        – persistent Community Solid Server identity + pod storage
#   bootstrap  – idempotent account, pod, WebID, and credentials provisioning
#   pim        – OpenCommons Health PIM web app
#
# Quick-start:
#   docker compose up --build
#
# Configurable ports (set in .env or shell before running):
#   CSS_PORT   – Solid Community Server port  (default: 3000)
#   APP_PORT   – PIM web app host port        (default: 8080)
#
# Visit:
#   http://localhost:${APP_PORT}        PIM app root
#   http://localhost:${APP_PORT}/healthz  PIM liveness probe
#   http://localhost:${CSS_PORT}        Solid Community Server
#
# Override defaults with a .env file (see .env.example).

services:
  # ── Solid Community Server ──────────────────────────────────────────────────
  css:
    build:
      context: .
      dockerfile: Dockerfile.css
    image: opencommons-health-css:7.1.8-local
    command:
      - "-c"
      - "@css:config/file.json"
      - "-f"
      - "/data"
      - "-p"
      - "${CSS_PORT:-3000}"
      - "-b"
      - "http://css.localhost:${CSS_PORT:-3000}/"
    ports:
      - "127.0.0.1:${CSS_PORT:-3000}:${CSS_PORT:-3000}"
    environment:
      CSS_LOGGING_LEVEL: warn
      OPENCOMMONS_ACCOUNT_EMAIL: ${CSS_ACCOUNT_EMAIL:-alice@example.test}
      OPENCOMMONS_ACCOUNT_PASSWORD: ${CSS_ACCOUNT_PASSWORD:?Copy .env.example to .env and set CSS_ACCOUNT_PASSWORD}
      OPENCOMMONS_POD_NAME: ${CSS_POD_NAME:-alice}
    volumes:
      - css_data:/data
    networks:
      default:
        aliases:
          - css.localhost
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${CSS_PORT:-3000}/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s
    restart: unless-stopped

  # ── Idempotent CSS provisioning ────────────────────────────────────────────
  bootstrap:
    image: node:22-alpine
    command: ["node", "/bootstrap/provision-css.mjs"]
    environment:
      CSS_BASE_URL: "http://css.localhost:${CSS_PORT:-3000}/"
      CSS_ACCOUNT_EMAIL: ${CSS_ACCOUNT_EMAIL:-alice@example.test}
      CSS_ACCOUNT_PASSWORD: ${CSS_ACCOUNT_PASSWORD:?Copy .env.example to .env and set CSS_ACCOUNT_PASSWORD}
      CSS_POD_NAME: ${CSS_POD_NAME:-alice}
      CSS_CLIENT_CREDENTIALS_FILE: /credentials/client-credentials.json
    volumes:
      - ./scripts/provision-css.mjs:/bootstrap/provision-css.mjs:ro
      - css_credentials:/credentials
    depends_on:
      css:
        condition: service_healthy
    restart: "no"

  # ── PIM web app ─────────────────────────────────────────────────────────────
  pim:
    build:
      context: .
      dockerfile: Dockerfile
    image: opencommons-health-pim:local
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:${APP_PORT:-8080}"
    environment:
      NODE_ENV: production
      PORT: "${APP_PORT:-8080}"
      HOST: 0.0.0.0
      SOLID_POD_SERVER_URL: "http://css.localhost:${CSS_PORT:-3000}"
      SOLID_OIDC_ISSUER: "http://css.localhost:${CSS_PORT:-3000}"
      SOLID_POD_BASE_URL: "http://css.localhost:${CSS_PORT:-3000}/${CSS_POD_NAME:-alice}/"
      SOLID_POD_PATH: ${SOLID_POD_PATH:-/health-pim/}
      SOLID_REDIRECT_URL: "http://localhost:${APP_PORT:-8080}/callback"
      SOLID_CLIENT_CREDENTIALS_FILE: /run/opencommons/client-credentials.json
      EPIC_ENABLED: "${EPIC_ENABLED:-false}"
      EPIC_MODE: "${EPIC_MODE:-mock}"
      EPIC_FHIR_BASE_URL: "${EPIC_FHIR_BASE_URL:-}"
      EPIC_CLIENT_ID: "${EPIC_CLIENT_ID:-}"
      EPIC_CLIENT_SECRET: "${EPIC_CLIENT_SECRET:-}"
      EPIC_CLIENT_SECRET_FILE: "${EPIC_CLIENT_SECRET_FILE:-}"
      EPIC_REDIRECT_URI: "${EPIC_REDIRECT_URI:-http://localhost:${APP_PORT:-8080}/api/integrations/epic/connect/callback}"
      EPIC_SCOPES: "${EPIC_SCOPES:-}"
      EPIC_GRANT_ENCRYPTION_KEY: "${EPIC_GRANT_ENCRYPTION_KEY:-}"
      EPIC_SYNC_ON_STARTUP: "${EPIC_SYNC_ON_STARTUP:-false}"
    volumes:
      - css_credentials:/run/opencommons:ro
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${APP_PORT:-8080}/livez || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  css_data:
  css_credentials:
